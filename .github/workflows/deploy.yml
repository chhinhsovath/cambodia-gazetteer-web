name: Deploy web to Cloudflare Pages

on:
  push:
    branches: [master]
    paths:
      - "web/**"
      - "cambodia_gazetteer.json"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

concurrency:
  group: cf-pages-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install
        working-directory: web
        run: npm ci

      - name: Build
        working-directory: web
        run: npm run build

      - name: Resolve dataset symlink
        # Cloudflare Pages won't follow git symlinks during deploy,
        # so copy the actual JSON into dist/ before upload.
        working-directory: web
        run: |
          rm -f dist/cambodia_gazetteer.json
          cp ../cambodia_gazetteer.json dist/cambodia_gazetteer.json
          ls -la dist/

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: web
          command: pages deploy dist --project-name=cambodia-gazetteer-web --branch=master --commit-dirty=true
